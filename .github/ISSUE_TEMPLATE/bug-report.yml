name: Bug Report
description: A skill or reference file caused Claude to generate incorrect code or give bad guidance
title: "[Bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: skill
    attributes:
      label: Skill
      description: Which skill is affected?
      options:
        - craftcms (plugin/module development)
        - craft-site (front-end Twig templates)
        - craft-content-modeling (sections, fields, Matrix)
        - craft-twig-guidelines (Twig coding standards)
        - craft-php-guidelines (PHP coding standards)
        - craft-garnish (CP JavaScript)
        - ddev (local dev environment)
        - craft-project-setup (CLAUDE.md scaffolding)
        - agent configuration
        - other
    validations:
      required: true

  - type: dropdown
    id: task-type
    attributes:
      label: Task type
      description: What were you building when the issue occurred?
      options:
        - plugin development
        - site development
        - content modeling
        - configuration
        - deployment
        - code review
        - debugging
        - other
    validations:
      required: true

  - type: textarea
    id: prompt
    attributes:
      label: Your prompt
      description: What did you ask Claude? Paste the exact prompt or a close paraphrase.
      placeholder: "e.g., 'Create a custom field type for storing GPS coordinates with validation'"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should Claude have generated or recommended?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What did Claude actually generate? Include the incorrect code, wrong pattern, or bad guidance.
      placeholder: |
        Paste Claude's response, the generated code, or describe the incorrect behavior.
        Use code fences (```) for code blocks.
    validations:
      required: true

  - type: input
    id: reference-file
    attributes:
      label: Reference file
      description: If you know which reference file contains the incorrect information, provide the path.
      placeholder: "e.g., skills/craftcms/references/elements.md"
    validations:
      required: false

  - type: input
    id: craft-version
    attributes:
      label: Craft CMS version
      placeholder: "e.g., 5.6.1"
    validations:
      required: false

  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: "e.g., 8.2.28"
    validations:
      required: false

  - type: input
    id: claude-version
    attributes:
      label: Claude Code version
      placeholder: "e.g., 1.0.16"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Error messages, screenshots, links to Craft source code that contradicts the skill content.
    validations:
      required: false
