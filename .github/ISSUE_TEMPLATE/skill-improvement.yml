name: Skill Improvement
description: Fix incorrect information, add missing patterns, or update outdated content in a skill or reference file
title: "[Improvement] "
labels: ["improvement"]
body:
  - type: input
    id: file
    attributes:
      label: File
      description: Path to the skill or reference file that needs updating.
      placeholder: "e.g., skills/craft-site/references/plugins/blitz.md"
    validations:
      required: true

  - type: dropdown
    id: skill
    attributes:
      label: Skill
      description: Which skill does this file belong to?
      options:
        - craftcms (plugin/module development)
        - craft-site (front-end Twig templates)
        - craft-content-modeling (sections, fields, Matrix)
        - craft-twig-guidelines (Twig coding standards)
        - craft-php-guidelines (PHP coding standards)
        - craft-garnish (CP JavaScript)
        - ddev (local dev environment)
        - craft-project-setup (CLAUDE.md scaffolding)
    validations:
      required: true

  - type: dropdown
    id: issue-type
    attributes:
      label: Issue type
      description: What kind of problem is this?
      options:
        - incorrect information
        - missing pattern
        - outdated for Craft 5.x
        - code example error
        - missing pitfall
        - cross-reference issue
    validations:
      required: true

  - type: textarea
    id: current-content
    attributes:
      label: Current content
      description: What does the file currently say? Paste the relevant section.
      render: markdown
    validations:
      required: false

  - type: textarea
    id: suggested-change
    attributes:
      label: Suggested change
      description: What should it say instead? Be specific — include corrected text, additional patterns, or the missing information.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Link to Craft CMS source code, official docs, or a changelog entry that supports your change.
      placeholder: |
        - https://github.com/craftcms/cms/blob/5.x/src/...
        - https://craftcms.com/docs/5.x/...
        - Tested in Craft 5.6.1 — the current pattern throws a deprecation warning
    validations:
      required: true

  - type: textarea
    id: prompt
    attributes:
      label: Your prompt
      description: If a prompt exposed this issue, share it so we can verify the fix works.
      placeholder: "e.g., 'Create a migration that adds a new Matrix field' — Claude used the old blocktype API"
    validations:
      required: false
